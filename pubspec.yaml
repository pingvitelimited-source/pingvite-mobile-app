name: pinginvite
description: "Event Management App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_bloc: ^9.1.1
  dio: ^5.9.0
  get_it: ^8.2.0
  dartz: ^0.10.1
  flutter_native_splash: ^2.4.6
  flutter_svg: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:

  uses-material-design: true

  assets:
    - assets/png/


flutter_native_splash:
  color: "#ffffff"            # Background color
  image: assets/png/applogo.png # Path to your splash logo
  android: true
  ios: true
  web: false

  android_12:
    image: assets/png/applogo.png
    icon_background_color: "#ffffff"

